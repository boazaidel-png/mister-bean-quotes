<div id="auth-screen" class="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-title">כניסה למערכת</div>
    <div class="auth-subtitle">התחברות מורשית למערכת ניהול הלידים של Mister Bean</div>
    <div class="auth-field"><label>מייל</label><input id="auth-email" type="email" autocomplete="email" placeholder="you@example.com"></div>
    <div class="auth-field"><label>סיסמה</label><input id="auth-password" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="auth-btn" onclick="loginUser()">התחבר</button>
    <div id="auth-error" class="auth-error"></div>
  </div>
</div>

<div id="modal-wrap">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title"><h2 id="modal-title-text">ליד</h2><button class="modal-close" onclick="closeModal()">✕</button></div>

    <div class="section-title">פרטי ליד</div>
    <div class="modal-grid">
      <div class="field"><label>שם חברה</label><input id="f_company" type="text" autocomplete="off"></div>
      <div class="field"><label>כמות עובדים</label><input id="f_employees" type="number" inputmode="numeric"></div>
      <div class="field"><label>מיקום</label><input id="f_location" type="text" autocomplete="off"></div>
      <div class="field"><label>חיבור / מקור</label><input id="f_connection" type="text" autocomplete="off"></div>
      <div class="field"><label>איש קשר</label><input id="f_contact" type="text" autocomplete="off"></div>
      <div class="field"><label>תפקיד</label><input id="f_role" type="text" autocomplete="off"></div>
      <div class="field"><label>טלפון</label><input id="f_phone" type="tel" inputmode="tel" style="direction:ltr;text-align:right" autocomplete="tel"></div>
      <div class="field"><label>מייל</label><input id="f_email" type="email" inputmode="email" style="direction:ltr;text-align:right" autocomplete="email"></div>
      <div class="field"><label>אחראי</label><select id="f_owner"></select></div>
      <div class="field"><label>רמת עדיפות</label><select id="f_priority"></select></div>
      <div class="field"><label>סטטוס</label><select id="f_status" onchange="updateMeetingSection()"></select></div>
      <div class="field"><label>תאריך פולואפ</label><input type="date" id="f_followUpDate" dir="ltr"></div>
    </div>

    <div class="section-title">מידע עסקי</div>
    <div class="modal-grid">
      <div class="field"><label>האם נמצאים בחוזה קיים?</label><select id="f_hasContract"><option></option><option>כן</option><option>לא</option><option>לא ידוע</option></select></div>
      <div class="field"><label>ספק קיים</label><input id="f_supplier" type="text" autocomplete="off"></div>
      <div class="field"><label>סוג מכונות</label><input id="f_machineType" type="text" autocomplete="off"></div>
      <div class="field"><label>כמות מכונות</label><input id="f_machineCount" type="number" inputmode="numeric"></div>
      <div class="field"><label>צריכה חודשית קיימת/משוערת</label><input id="f_monthlyConsumption" type="text" autocomplete="off" placeholder="לדוגמה: 30 ק״ג בחודש"></div>
      <div class="field"><label>מחיר לקילו</label><input id="f_pricePerKg" type="number" inputmode="decimal" step="0.01"></div>
    </div>
    <div class="field"><label>הערות</label><textarea id="f_notes" rows="3"></textarea></div>
    <div class="field"><label>תאריך עדכון אחרון</label><input type="text" id="f_lastUpdatedDisplay" dir="ltr" readonly style="background:#f4f5f7;color:#5e6c84"></div>

    <div id="meeting-section" class="meeting-box" style="display:none">
      <div class="meeting-box-title">📅 פרטי פגישה</div>
      <div class="meeting-grid">
        <div class="field"><label>תאריך פגישה</label><input type="date" id="f_meetingDate" dir="ltr"></div>
        <div class="field"><label>שעה</label><input type="time" id="f_meetingTime" value="09:00"></div>
      </div>
      <div class="field"><label>מיקום פגישה</label><input type="text" id="f_meetingLocation" placeholder="משרד הלקוח, זום, וכו׳" autocomplete="off"></div>
      <div class="field"><label>מייל לזימון (אופציונלי)</label><input type="email" id="f_meetingGuest" placeholder="email@example.com" style="direction:ltr;text-align:right"></div>
      <div class="cal-btns"><button class="btn-gcal" onclick="openGCal()">📆 פתח ב-Google Calendar</button><button class="btn-ics" onclick="buildICS()">⬇️ הורד ICS</button></div>
    </div>

    <div class="modal-btns"><button class="btn-delete" id="btn-delete-lead" onclick="deleteLead()" style="display:none">🗑️ מחק</button><button class="btn-cancel" onclick="closeModal()">ביטול</button><button class="btn-quote" onclick="openQuoteFromLead()">🧾 הצעת מחיר</button><button class="btn-save" onclick="saveLead()">💾 שמור</button></div>
  </div>
</div>

function updateStatus(id,status){
  var sid=String(id);
  var existing=leads.find(function(l){return String(l.id)===sid;});

  if(status==="לפנייה עתידית"&&(!existing||!existing.followUpDate)){
    alert("כדי להעביר ליד לסטטוס לפנייה עתידית צריך לפתוח את הליד ולהזין תאריך פנייה.");
    openEdit(id);
    setTimeout(function(){
      var s=document.getElementById("f_status");
      if(s){
        s.value="לפנייה עתידית";
        updateMeetingSection();
      }
    },100);
    return;
  }

  var changed=false;
  var nl=leads.map(function(l){
    if(String(l.id)!==sid)return l;
    changed=true;
    var oldStatus=l.status||"";
    var statusChanged=(oldStatus!==status);
    var updated=Object.assign({},l,{
      status:status,
      statusChangedAt:statusChanged?nowDateTime():(l.statusChangedAt||nowDateTime()),
      createdAt:l.createdAt||l.lastUpdatedAt||l.lastUpdated||nowDateTime(),
      lastUpdated:today(),
      lastUpdatedAt:nowDateTime()
    });
    if(statusChanged)updated=appendStatusHistory(updated,oldStatus,status);
    return normalizeLead(updated);
  });

  if(!changed)return;

  leads=normalizeLeadsList(nl);
  saveLocalBackup(leads);
  syncStatus="syncing";
  render();

  saveLeads(leads).then(function(){
    syncStatus="ok";
    lastSync=new Date();
    updateBadge();
  }).catch(function(){
    syncStatus="error";
    updateBadge();
    alert("השינוי נשמר מקומית, אבל לא הצליח להסתנכרן לענן.");
  });
}

function pad2(n){return String(n).padStart(2,"0");}
function dateTimeForICS(date,time){
  if(!date)return "";
  var p=date.split("-");
  var t=(time||"09:00").split(":");
  return p[0]+p[1]+p[2]+"T"+pad2(t[0]||"09")+pad2(t[1]||"00")+"00";
}
function addOneHourICS(dt){
  if(!dt)return "";
  var y=Number(dt.slice(0,4)),m=Number(dt.slice(4,6))-1,d=Number(dt.slice(6,8)),h=Number(dt.slice(9,11)),mi=Number(dt.slice(11,13));
  var date=new Date(y,m,d,h,mi,0);
  date.setHours(date.getHours()+1);
  return date.getFullYear()+pad2(date.getMonth()+1)+pad2(date.getDate())+"T"+pad2(date.getHours())+pad2(date.getMinutes())+"00";
}
function escapeICS(v){

  var start=dateTimeForICS(date,time||"09:00");

    +"DESCRIPTION:"+escapeICS(description)+"\n"
    +"DTSTART:"+start+"\n"
    +"DTEND:"+end+"\n"
    +"DTSTAMP:"+stamp+"\n"
    +"BEGIN:VALARM\n"
    +"TRIGGER:-PT30M\n"
    +"ACTION:DISPLAY\n"
    +"DESCRIPTION:"+escapeICS(title)+"\n"
